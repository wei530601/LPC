            <!-- 面板用户页面 -->
            <div class="page" id="panelUsers">
                <div class="page-header">
                    <h2>面板用户管理</h2>
                    <div class="user-header-buttons">
                        <button class="btn btn-primary" onclick="showAddPanelUserDialog()">添加面板用户</button>
                        <button class="btn" onclick="loadPanelUsers()">刷新</button>
                    </div>
                </div>

                <div class="card-group">
                    <div class="collapsible-header active" onclick="toggleCollapse(this)">
                        <div class="collapsible-title">
                            <span class="collapsible-icon">▶</span>
                            <span>账号列表</span>
                        </div>
                    </div>
                    <div class="collapsible-content active">
                        <div class="collapsible-body">
                            <div id="panel-users-tip" class="stats" style="margin-bottom: 1rem;"></div>
                            <table class="modern-table">
                                <thead>
                                    <tr>
                                        <th>用户名</th>
                                        <th>角色</th>
                                        <th>创建时间</th>
                                        <th>权限摘要</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody id="panel-users-table-body"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div class="card-group">
                    <div class="collapsible-header" onclick="toggleCollapse(this)">
                        <div class="collapsible-title">
                            <span class="collapsible-icon">▶</span>
                            <span>操作审计日志</span>
                        </div>
                    </div>
                    <div class="collapsible-content">
                        <div class="collapsible-body">
                            <div class="user-header-buttons" style="margin-bottom: 1rem;">
                                <button class="btn btn-sm" onclick="loadAuditLogs()">刷新日志</button>
                            </div>
                            <div id="audit-log-tip" class="stats" style="margin-bottom: 1rem;"></div>
                            <table class="modern-table">
                                <thead>
                                    <tr>
                                        <th>时间</th>
                                        <th>用户</th>
                                        <th>动作</th>
                                        <th>目标</th>
                                        <th>结果</th>
                                    </tr>
                                </thead>
                                <tbody id="audit-log-table-body"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 添加面板用户弹窗 -->
            <div class="modal" id="add-panel-user-modal">
                <div class="modal-content" style="max-width:420px">
                    <div class="modal-header">
                        <h3>添加面板用户</h3>
                        <button class="modal-close" onclick="closeAddPanelUserModal()">✕</button>
                    </div>
                    <div class="modal-body" style="padding:1.2rem 1.5rem">
                        <div class="form-group" style="margin-bottom:1rem">
                            <label>用户名（3-32位，字母/数字/下划线）</label>
                            <input type="text" id="new-panel-username" class="form-input" placeholder="请输入用户名" autocomplete="off">
                        </div>
                        <div class="form-group" style="margin-bottom:1rem">
                            <label>初始密码（至少6位）</label>
                            <input type="password" id="new-panel-password" class="form-input" placeholder="请输入密码">
                        </div>
                        <div class="form-group" style="display:flex;align-items:center;gap:.6rem">
                            <input type="checkbox" id="new-panel-is-admin" style="width:16px;height:16px;cursor:pointer">
                            <label for="new-panel-is-admin" style="margin:0;cursor:pointer">设为管理员</label>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button class="btn" onclick="closeAddPanelUserModal()">取消</button>
                        <button class="btn btn-primary" onclick="submitAddPanelUser()">确认添加</button>
                    </div>
                </div>
            </div>

            <!-- 重置密码弹窗 -->
            <div class="modal" id="reset-panel-password-modal">
                <div class="modal-content" style="max-width:380px">
                    <div class="modal-header">
                        <h3>重置密码 — <span id="reset-target-username"></span></h3>
                        <button class="modal-close" onclick="closeResetPasswordModal()">✕</button>
                    </div>
                    <div class="modal-body" style="padding:1.2rem 1.5rem">
                        <div class="form-group">
                            <label>新密码（至少6位）</label>
                            <input type="password" id="reset-panel-new-password" class="form-input" placeholder="请输入新密码">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button class="btn" onclick="closeResetPasswordModal()">取消</button>
                        <button class="btn btn-primary" onclick="submitResetPanelPassword()">确认重置</button>
                    </div>
                </div>
            </div>

            <!-- 权限编辑弹窗 -->
            <div class="modal" id="permissions-modal">
                <div class="modal-content" style="max-width: 520px;">
                    <div class="modal-header">
                        <h3>权限配置 — <span id="permission-target-username"></span></h3>
                        <button class="modal-close" onclick="closePermissionsModal()">✕</button>
                    </div>
                    <div class="modal-body" style="padding:1.2rem 1.5rem;">
                        <div id="permission-checkbox-list" class="permissions-grid"></div>
                    </div>
                    <div class="modal-footer">
                        <button class="btn" onclick="closePermissionsModal()">取消</button>
                        <button class="btn btn-primary" onclick="submitPanelUserPermissions()">保存权限</button>
                    </div>
                </div>
            </div>
