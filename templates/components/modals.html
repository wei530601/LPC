<!-- File Editor Modal Dialog -->
<div class="modal" id="editor-modal">
    <div class="modal-content modal-editor">
        <div class="modal-header">
            <div style="display:flex;align-items:center;gap:0.75rem;min-width:0;flex:1;overflow:hidden">
                <h3 style="white-space:nowrap">编辑文件</h3>
                <span id="editor-filename" style="font-family:monospace;font-size:0.85rem;color:#888;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
                <span id="editor-lang-badge" class="lang-badge"></span>
            </div>
            <div style="display:flex;gap:0.5rem;align-items:center;flex-shrink:0">
                <button class="btn btn-sm btn-primary" onclick="saveFile()">保存</button>
                <button class="modal-close" onclick="closeEditor()">✕</button>
            </div>
        </div>
        <div class="modal-body editor-body">
            <div id="monaco-editor-container"></div>
        </div>
    </div>
</div>
