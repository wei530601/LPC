<!-- 磁盘分析页面 -->
<div class="page" id="disk">
    <div class="page-header">
        <h2>磁盘大文件分析</h2>
    </div>

    <!-- 磁盘使用概览 -->
    <div class="card-group">
        <div class="collapsible-header active" onclick="toggleCollapse(this)">
            <div class="collapsible-title">
                <span class="collapsible-icon">▶</span>
                <span>磁盘使用概览</span>
            </div>
        </div>
        <div class="collapsible-content active">
            <div class="collapsible-body">
                <div id="disk-partitions-list">
                    <div class="loading-text">加载中...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 大文件扫描 -->
    <div class="card-group">
        <div class="collapsible-header active" onclick="toggleCollapse(this)">
            <div class="collapsible-title">
                <span class="collapsible-icon">▶</span>
                <span>大文件扫描</span>
            </div>
        </div>
        <div class="collapsible-content active">
            <div class="collapsible-body">
                <div class="form-row" style="display:flex;gap:0.8rem;align-items:flex-end;flex-wrap:wrap;margin-bottom:1rem;">
                    <div class="form-group" style="flex:1;min-width:200px;margin-bottom:0;">
                        <label>扫描目录</label>
                        <input type="text" id="disk-scan-path" value="/" placeholder="输入绝对路径">
                    </div>
                    <div class="form-group" style="width:120px;margin-bottom:0;">
                        <label>显示数量</label>
                        <select id="disk-scan-limit">
                            <option value="20">前 20</option>
                            <option value="50" selected>前 50</option>
                            <option value="100">前 100</option>
                            <option value="200">前 200</option>
                        </select>
                    </div>
                    <button class="btn btn-primary" onclick="scanLargeFiles()" id="disk-scan-btn">开始扫描</button>
                </div>
                <div id="disk-scan-status" style="display:none;margin-bottom:0.8rem;color:#f0a500;">
                    扫描中，请稍候...
                </div>
                <div id="disk-large-files-result" style="display:none;">
                    <div style="margin-bottom:0.5rem;font-size:0.85rem;color:#7f8c8d;">
                        扫描路径：<span id="disk-scan-result-path"></span>，
                        共找到 <span id="disk-scan-result-count"></span> 个文件
                    </div>
                    <div class="table-container">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th style="width:50px;">#</th>
                                    <th>文件路径</th>
                                    <th style="width:120px;text-align:right;">大小</th>
                                </tr>
                            </thead>
                            <tbody id="disk-large-files-tbody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
