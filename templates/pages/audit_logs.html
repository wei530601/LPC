            <!-- 操作日志页面 -->
            <div class="page" id="auditLogs">
                <div class="page-header">
                    <h2>操作日志</h2>
                    <div class="user-header-buttons">
                        <button class="btn" onclick="loadAuditLogs()">刷新</button>
                        <button class="btn" onclick="exportAuditLogs()">导出 CSV</button>
                    </div>
                </div>

                <div class="card" style="margin-bottom:1rem;">
                    <div class="card-body">
                        <div class="permissions-grid">
                            <div class="form-group" style="margin-bottom:0;">
                                <label>用户</label>
                                <input type="text" id="audit-filter-username" placeholder="用户名">
                            </div>
                            <div class="form-group" style="margin-bottom:0;">
                                <label>动作</label>
                                <input type="text" id="audit-filter-action" placeholder="例如 files.delete">
                            </div>
                            <div class="form-group" style="margin-bottom:0;">
                                <label>结果</label>
                                <select id="audit-filter-result">
                                    <option value="">全部</option>
                                    <option value="success">success</option>
                                    <option value="failed">failed</option>
                                    <option value="denied">denied</option>
                                </select>
                            </div>
                            <div class="form-group" style="margin-bottom:0;">
                                <label>关键字</label>
                                <input type="text" id="audit-filter-keyword" placeholder="目标/详情/动作">
                            </div>
                        </div>
                        <div style="margin-top:0.8rem; display:flex; gap:0.5rem; justify-content:flex-end;">
                            <button class="btn btn-sm" onclick="clearAuditFilters()">清空筛选</button>
                            <button class="btn btn-sm btn-primary" onclick="loadAuditLogs()">应用筛选</button>
                        </div>
                    </div>
                </div>

                <div class="card-group">
                    <div class="collapsible-header active" onclick="toggleCollapse(this)">
                        <div class="collapsible-title">
                            <span class="collapsible-icon">▶</span>
                            <span>操作审计日志</span>
                        </div>
                    </div>
                    <div class="collapsible-content active">
                        <div class="collapsible-body">
                            <div id="audit-log-tip" class="stats" style="margin-bottom: 1rem;"></div>
                            <table class="modern-table">
                                <thead>
                                    <tr>
                                        <th>时间</th>
                                        <th>用户</th>
                                        <th>动作</th>
                                        <th>目标</th>
                                        <th>结果</th>
                                        <th>详情</th>
                                    </tr>
                                </thead>
                                <tbody id="audit-log-table-body"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
