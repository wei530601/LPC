            <!-- 文件管理页面 -->
            <div class="page" id="files">
                <div class="page-header">
                    <h2>文件管理</h2>
                    <div class="file-actions">
                        <button class="btn btn-sm" id="btn-create-folder" onclick="createFolder()">新建文件夹</button>
                        <button class="btn btn-sm" id="btn-create-file" onclick="createFile()">新建文件</button>
                        <button class="btn btn-sm" id="btn-upload-file" onclick="uploadFile()">上传</button>
                    </div>
                </div>

                <div class="file-manager">
                    <div class="breadcrumb" id="breadcrumb"></div>
                    
                    <div class="card">
                        <div class="card-body">
                            <div class="file-list" id="file-list"></div>
                        </div>
                    </div>
                </div>

                <div id="file-context-menu" class="file-context-menu"></div>

                <!-- 路径跳转确认弹窗 -->
                <div class="modal" id="files-nav-confirm-modal">
                    <div class="modal-content" style="max-width:380px">
                        <div class="modal-header">
                            <h3>确认跳转</h3>
                            <button class="modal-close" onclick="closeFilesNavConfirm()">✕</button>
                        </div>
                        <div class="modal-body">
                            <p>确认跳转到：</p>
                            <p style="margin-top:0.5rem;font-family:monospace;word-break:break-all;font-size:0.95rem" id="files-nav-confirm-target"></p>
                        </div>
                        <div class="modal-footer">
                            <button class="btn" onclick="closeFilesNavConfirm()">取消</button>
                            <button class="btn btn-primary" onclick="confirmFilesNav()">确认</button>
                        </div>
                    </div>
                </div>

                <!-- 新建文件夹/文件弹窗 -->
                <div class="modal" id="create-item-modal">
                    <div class="modal-content" style="max-width:380px">
                        <div class="modal-header">
                            <h3 id="create-item-title">新建文件夹</h3>
                            <button class="modal-close" onclick="closeCreateItemModal()">✕</button>
                        </div>
                        <div class="modal-body">
                            <label id="create-item-placeholder" style="display:block;margin-bottom:0.4rem;font-size:0.9rem">文件夹名称</label>
                            <input type="text" id="create-item-name" class="path-input" style="width:100%;box-sizing:border-box"
                                onkeydown="if(event.key==='Enter'){submitCreateItem();event.preventDefault();}">
                        </div>
                        <div class="modal-footer">
                            <button class="btn" onclick="closeCreateItemModal()">取消</button>
                            <button class="btn btn-primary" onclick="submitCreateItem()">确认</button>
                        </div>
                    </div>
                </div>

                <!-- 文件预览弹窗 -->
                <div class="modal" id="file-preview-modal">
                    <div class="modal-content modal-preview">
                        <div class="modal-header">
                            <div style="display:flex;align-items:center;gap:0.75rem;min-width:0;flex:1;overflow:hidden">
                                <h3 style="white-space:nowrap">预览</h3>
                                <span id="preview-filename" style="font-family:monospace;font-size:0.85rem;color:#888;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
                                <span id="preview-lang-badge" class="lang-badge" style="display:none"></span>
                            </div>
                            <div style="display:flex;gap:0.5rem;align-items:center;flex-shrink:0">
                                <button class="btn btn-sm" id="preview-edit-btn" onclick="editFileFromPreview()" style="display:none">编辑</button>
                                <button class="btn btn-sm btn-secondary" id="preview-download-btn" onclick="downloadFileFromPreview()">下载</button>
                                <button class="modal-close" onclick="closePreview()">✕</button>
                            </div>
                        </div>
                        <div class="modal-body preview-body" id="preview-body">
                            <div class="preview-loading">加载中...</div>
                        </div>
                    </div>
                </div>
            </div>
