<!-- File Editor Modal Dialog -->
<div class="modal" id="editor-modal">
    <div class="modal-content modal-large">
        <div class="modal-header">
            <h3>编辑文件: <span id="editor-filename"></span> <span id="editor-dirty-indicator" style="color:#f0a500;display:none;" title="有未保存的修改">●</span></h3>
            <button class="modal-close" onclick="closeEditor()">&times;</button>
        </div>
        <div class="modal-body" style="padding:0;">
            <div class="editor-toolbar">
                <button class="btn btn-sm" onclick="editorExecCommand('find')" title="查找 (Ctrl+F)">查找</button>
                <button class="btn btn-sm" onclick="editorExecCommand('replace')" title="替换 (Ctrl+H)">替换</button>
                <button class="btn btn-sm" onclick="editorExecCommand('jumpToLine')" title="跳转行 (Alt+G)">跳转行</button>
                <span id="editor-cursor-pos" style="margin-left:auto;font-size:0.8rem;color:#7f8c8d;align-self:center;"></span>
            </div>
            <div id="file-editor-cm"></div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeEditor()">取消</button>
            <button class="btn btn-primary" onclick="saveFile()">保存</button>
        </div>
    </div>
</div>

<div class="modal" id="preview-modal">
    <div class="modal-content modal-large">
        <div class="modal-header">
            <h3>文件预览: <span id="preview-filename"></span></h3>
            <button class="modal-close" onclick="closePreview()">&times;</button>
        </div>
        <div class="modal-body">
            <div id="preview-content" class="preview-content"></div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closePreview()">关闭</button>
        </div>
    </div>
</div>

<div class="modal" id="app-dialog-modal" onclick="if(event.target===this)closeAppDialog(false)">
    <div class="modal-content" style="max-width: 430px;">
        <div class="modal-header">
            <h3 id="app-dialog-title">提示</h3>
            <button class="modal-close" onclick="closeAppDialog(false)">&times;</button>
        </div>
        <div class="modal-body">
            <div id="app-dialog-message" class="app-dialog-message"></div>
            <input id="app-dialog-input" class="form-input" style="margin-top: 0.8rem; display: none;" autocomplete="off">
        </div>
        <div class="modal-footer">
            <button id="app-dialog-cancel" class="btn" onclick="closeAppDialog(false)">取消</button>
            <button id="app-dialog-ok" class="btn btn-primary" onclick="closeAppDialog(true)">确定</button>
        </div>
    </div>
</div>
