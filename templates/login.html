<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - Pi Panel</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a2e;
        }

        body.light-theme {
            background: #e9ecef;
        }

        .login-wrapper {
            width: 100%;
            max-width: 420px;
            padding: 1rem;
        }

        .login-brand {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-brand .logo-icon-large {
            width: 56px;
            height: 56px;
            margin-bottom: 0.75rem;
            filter: brightness(0) invert(1);
        }

        body.light-theme .login-brand .logo-icon-large {
            filter: none;
        }

        .login-brand h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 0.25rem;
        }

        body.light-theme .login-brand h1 {
            color: #2c3e50;
        }

        .login-brand p {
            color: rgba(255,255,255,0.55);
            font-size: 0.9rem;
        }

        body.light-theme .login-brand p {
            color: #7f8c8d;
        }

        .login-card {
            background: #16213e;
            border-radius: 3px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.08);
            overflow: hidden;
        }

        body.light-theme .login-card {
            background: #ffffff;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            border: 1px solid #e8e8e8;
        }

        .login-card-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            font-size: 0.95rem;
            font-weight: 600;
            color: rgba(255,255,255,0.9);
        }

        body.light-theme .login-card-header {
            border-bottom-color: #ecf0f1;
            color: #2c3e50;
        }

        .login-card-body {
            padding: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.4rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: rgba(255,255,255,0.7);
        }

        body.light-theme .form-group label {
            color: #555;
        }

        .form-group input {
            width: 100%;
            padding: 0.6rem 0.875rem;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 3px;
            font-size: 0.95rem;
            color: #fff;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }

        body.light-theme .form-group input {
            background: #f8f9fa;
            border-color: #dde1e7;
            color: #333;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            background: rgba(102,126,234,0.08);
        }

        body.light-theme .form-group input:focus {
            background: #fff;
            border-color: #667eea;
        }

        .btn-login {
            width: 100%;
            padding: 0.65rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 3px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 0.5rem;
        }

        .btn-login:hover {
            opacity: 0.9;
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .login-error {
            margin-top: 0.875rem;
            padding: 0.6rem 0.875rem;
            background: rgba(231,76,60,0.15);
            border: 1px solid rgba(231,76,60,0.4);
            border-radius: 3px;
            color: #e74c3c;
            font-size: 0.875rem;
            display: none;
        }

        body.light-theme .login-error {
            background: #fdf2f2;
            border-color: #f5c6cb;
            color: #c0392b;
        }

        .login-error.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-brand">
            <img src="/static/images/logo.svg" alt="Pi Panel" class="logo-icon-large">
            <h1>Pi Panel</h1>
            <p>树莓派控制面板</p>
        </div>

        <div class="login-card">
            <div class="login-card-header">账户登录</div>
            <div class="login-card-body">
                <form id="loginForm">
                    <div class="form-group">
                        <label for="username">用户名</label>
                        <input type="text" id="username" name="username" required autofocus placeholder="请输入用户名">
                    </div>
                    <div class="form-group">
                        <label for="password">密码</label>
                        <input type="password" id="password" name="password" required placeholder="请输入密码">
                    </div>
                    <button type="submit" class="btn-login" id="loginBtn">登录</button>
                    <div class="login-error" id="error"></div>
                </form>
            </div>
        </div>
    </div>

    <script>
        // 加载主题（与主应用同步）
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            if (savedTheme === 'light') {
                document.body.className = 'light-theme';
            }
        })();

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error');
            const loginBtn = document.getElementById('loginBtn');

            errorDiv.classList.remove('show');
            loginBtn.disabled = true;
            loginBtn.textContent = '登录中...';

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();
                if (data.success) {
                    window.location.href = '/';
                } else {
                    errorDiv.textContent = data.error || '用户名或密码错误';
                    errorDiv.classList.add('show');
                    loginBtn.disabled = false;
                    loginBtn.textContent = '登录';
                }
            } catch (error) {
                errorDiv.textContent = '网络错误，请重试';
                errorDiv.classList.add('show');
                loginBtn.disabled = false;
                loginBtn.textContent = '登录';
            }
        });
    </script>
</body>
</html>
